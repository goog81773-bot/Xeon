<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarzan Bot - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f19; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-emerald-500/10 text-emerald-400 rounded-2xl border border-emerald-500/20">
                    <i data-lucide="zap" class="w-8 h-8 animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wide text-white bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">TARZAN WHATSAPP BOT</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full bg-gray-900 border border-gray-800">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500 animate-ping"></span>
                    <span id="status-text" class="text-gray-300 text-sm font-semibold">جاري التحقق...</span>
                </div>
                <button onclick="restartBot()" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 text-gray-950 font-bold px-4 py-2 rounded-xl flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> تحديث
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Right Column: Control & Pairing -->
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-gray-950/60 border border-gray-800/80 rounded-3xl p-6 relative overflow-hidden">
                <h3 class="text-lg font-bold text-white mb-2 flex items-center gap-2">
                    <i data-lucide="smartphone" class="text-emerald-400"></i> نظام الربط المباشر
                </h3>
                <p class="text-gray-400 text-xs mb-6">أدخل رقمك مع رمز الدولة (مثال: 966500000000) لتوليد كود الربط الخاص بك.</p>

                <div class="space-y-4">
                    <input type="text" id="phone-number" placeholder="966..." class="w-full bg-gray-900 border border-gray-800 focus:border-emerald-500 rounded-2xl py-3 px-4 font-mono text-white outline-none" />
                    <button onclick="getPairingCode()" id="btn-pair" class="w-full bg-emerald-500 hover:bg-emerald-400 text-gray-950 font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-2">
                        <i data-lucide="key-round" class="w-5 h-5"></i> احصل على الرمز
                    </button>
                </div>

                <div id="pairing-result" class="mt-6 p-4 rounded-2xl bg-gray-900/80 border border-emerald-500/20 text-center hidden">
                    <span class="text-xs text-gray-400 mb-2 block">الكود الخاص بك جاهز:</span>
                    <div class="flex items-center justify-center gap-3">
                        <div id="pairing-code" class="text-3xl font-black text-emerald-400 font-mono tracking-widest">----</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 bg-gray-950/60 border border-gray-800/80 rounded-3xl overflow-hidden flex flex-col h-[500px]">
            <div class="bg-gray-900 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                <h3 class="text-sm font-semibold text-gray-300 font-mono flex items-center gap-2">
                    <i data-lucide="terminal" class="w-4 h-4"></i> سجل النظام المباشر
                </h3>
                <button onclick="clearLogs()" class="text-gray-400 hover:text-white text-xs flex items-center gap-1">
                    مسح <i data-lucide="trash-2" class="w-3 h-3"></i>
                </button>
            </div>
            
            <div id="logs-container" class="flex-1 p-4 font-mono text-xs overflow-y-auto space-y-2 bg-gray-950">
                <div class="text-gray-500 text-center my-auto" id="no-logs-msg">بانتظار السجلات...</div>
            </div>
        </section>

    </main>

    <script>
        let lastLogCount = 0;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                const btnPair = document.getElementById('btn-pair');
                const result = document.getElementById('pairing-result');
                const code = document.getElementById('pairing-code');

                if (data.status === 'Connected') {
                    dot.className = 'w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]';
                    txt.innerText = 'متصل بالواتساب';
                    txt.className = 'text-emerald-400 font-bold text-sm';
                } else if (data.status === 'Connecting') {
                    dot.className = 'w-3 h-3 rounded-full bg-yellow-500 animate-pulse';
                    txt.innerText = 'جاري التوصيل...';
                    txt.className = 'text-yellow-400 font-bold text-sm';
                } else {
                    dot.className = 'w-3 h-3 rounded-full bg-red-500';
                    txt.innerText = 'غير متصل';
                    txt.className = 'text-red-500 font-bold text-sm';
                }

                if (data.pairingCode) {
                    result.classList.remove('hidden');
                    code.innerText = data.pairingCode;
                    btnPair.disabled = true;
                    btnPair.innerHTML = `<i data-lucide="check"></i> تم توليد الكود`;
                    btnPair.className = 'w-full bg-emerald-900 text-emerald-400 font-bold py-3.5 rounded-2xl flex justify-center gap-2';
                }
            } catch (err) {}
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const container = document.getElementById('logs-container');

                if (logs.length > 0) {
                    if (document.getElementById('no-logs-msg')) document.getElementById('no-logs-msg').remove();
                    
                    container.innerHTML = logs.map(log => {
                        let c = 'text-gray-300';
                        if (log.type === 'ERROR') c = 'text-red-400';
                        if (log.type === 'SUCCESS') c = 'text-emerald-400';
                        if (log.type === 'EXECUTE') c = 'text-purple-400';
                        return `<div class="p-1 border-b border-gray-900/50"><span class="text-gray-600">[${log.time}]</span> <span class="font-bold ${c}">[${log.type}]</span> <span class="text-gray-300">${log.message}</span></div>`;
                    }).join('');

                    if (logs.length !== lastLogCount) {
                        container.scrollTop = container.scrollHeight;
                        lastLogCount = logs.length;
                    }
                }
            } catch (e) {}
        }

        async function getPairingCode() {
            const phone = document.getElementById('phone-number').value.trim();
            if (!phone || phone.length < 9) return alert('الرجاء إدخال رقم صحيح');
            
            document.getElementById('btn-pair').innerHTML = 'جاري الطلب...';
            await fetch('/api/connect', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({phone}) });
        }

        async function restartBot() {
            await fetch('/api/restart', { method: 'POST' });
            alert('تم التحديث');
        }

        function clearLogs() {
            document.getElementById('logs-container').innerHTML = '<div class="text-gray-500 text-center" id="no-logs-msg">تم المسح</div>';
            lastLogCount = 0;
        }

        window.onload = () => {
            lucide.createIcons();
            setInterval(fetchStatus, 2000);
            setInterval(fetchLogs, 2000);
            fetchStatus(); fetchLogs();
        };
    </script>
</body>
</html>
